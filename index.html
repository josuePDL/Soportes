<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Soportes - Panel Unificado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
table td, table th { border:none !important; }
/* Estilos para separar los paneles visualmente */
.panel-section {
    padding-top: 2rem;
    padding-bottom: 2rem;
    border-bottom: 2px dashed #dee2e6;
}
.panel-section:last-child {
    border-bottom: none;
}
/* Compensa el salto del ancla por la barra de navegación fija */
html {
    scroll-padding-top: 80px; 
}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Sistema Soportes</a>
        <div>
            <a class="btn btn-outline-light btn-sm" href="#seccion-ciclo">Ciclo</a>
            <a class="btn btn-outline-light btn-sm" href="#seccion-mes">Mes</a>
            <a class="btn btn-outline-light btn-sm" href="#seccion-finanzas">Finanzas</a>
        </div>
    </div>
</nav>

<div class="container">

    <div id="seccion-ciclo" class="panel-section">
        <h2 class="mb-4">Ciclo</h2>
        <form id="form-soporte" class="card p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <label>Fecha</label>
                    <input id="fecha" type="date" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Cantidad</label>
                    <input id="cantidad" type="number" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label>¿Es a cobrar?</label>
                    <select id="a-cobrar" class="form-select">
                        <option value="false">No</option>
                        <option value="true">Sí</option>
                    </select>
                </div>
            </div>

            <div id="bloque-cobro" class="mt-3 d-none">
                <div class="row">
                    <div class="col-md-6">
                        <label>Precio Servicio</label>
                        <select id="precio-servicio" class="form-select">
                            <option value="175">Q175</option>
                            <option value="310">Q310</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label>No Factura</label>
                        <input id="num-factura" class="form-control">
                    </div>
                </div>
            </div>

            <button class="btn btn-primary mt-3">Guardar</button>
        </form>

        <div class="row mb-4">
            <div class="col">
                <div class="card p-3">
                    <h6>Total</h6>
                    <h3 id="total-soportes">0</h3>
                </div>
            </div>
            <div class="col">
                <div class="card p-3">
                    <h6></h6>
                    <h3 id="salario"></h3>
                </div>
            </div>
            <div class="col">
                <div class="card p-3">
                    <h6>Rango</h6>
                    <h6 id="rango"></h6>
                </div>
            </div>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Cantidad</th>
                    <th>Mi Pago</th>
                    <th>A Cobrar</th>
                    <th>Precio</th>
                    <th>Factura</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabla-soportes"></tbody>
        </table>
    </div>

    <div id="seccion-mes" class="panel-section">
        <h2 id="nombre-mes" class="mb-4">Mes</h2>

        <div class="row mb-4 g-3 justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 text-center h-100 shadow-sm border-0 bg-light">
                    <h6 class="text-muted text-uppercase fw-bold">Soportes Realizados</h6>
                    <h1 id="total-soportes-mes" class="display-4 text-primary mb-0 fw-bold">0</h1>
                </div>
            </div>
        </div>

        <div class="card p-4 shadow-sm border-0">
            <h5 class="text-center mb-4 text-muted">Rendimiento Mensual</h5> 
            <canvas id="grafica-mes"></canvas>
        </div>
    </div>

    <div id="seccion-finanzas" class="panel-section">
        <h2 class="mb-4">Finanzas</h2>
        <select id="filtro-mes" class="form-select mb-4"></select>

        <form id="form-finanza" class="card p-4 mb-4">
            <select id="periodo-movimiento" class="form-select mb-2">
                <option value="quincena">Quincena</option>
                <option value="fin_mes">Fin de Mes</option>
            </select>
            
            <input id="descripcion" class="form-control mb-2" placeholder="Descripción" required>
            <input id="monto" type="number" step="0.01" class="form-control mb-2" placeholder="Monto" required>
            
            <select id="tipo" class="form-select mb-2">
                <option value="ingreso">Ingreso</option>
                <option value="gasto">Gasto</option>
            </select>
            <button class="btn btn-primary">Guardar</button>
        </form>

        <div class="row">
            <div class="col-md-6">
                <h4>Quincena</h4>
                <table class="table">
                    <tbody id="tabla-quincena"></tbody>
                </table>
            </div>

            <div class="col-md-6">
                <h4>Fin de Mes</h4>
                <table class="table">
                    <tbody id="tabla-finmes"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
<script src="app.js"></script>
</body>
</html>
